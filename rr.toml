# ===========================================================================
# rr - built-in default configuration
# ===========================================================================
# The base layer every rr run starts from. A project overrides it by dropping
# a `.rr.toml` at its repository root; rr merges that file over these
# defaults. The kind mechanism and the invariants every kind obeys are fixed
# by `[[rr:AD-1]]`; this file declares the default profile's kinds and scope.

[index]
path = ".ref-cache/index"          # or the REF_INDEX env var
respect-gitignore = true           # honor .gitignore / .ignore / .rgignore (CLI: --no-ignore)
hidden = false                     # skip dotfiles (CLI: --hidden to include)
follow-symlinks = false            # CLI: -L/--follow to enable
# Default scope is the whole working tree minus ignored files. Projects
# narrow it via include/exclude (or -g/--glob).
include = ["**"]
exclude = []

[verify]
# The gate (`[[rr:AD-3]]`) judges documentation prose by default: where
# references live and where rr scans structurally (see [scan] below).
# Projects widen this, e.g. to source-comment scopes, in their own .rr.toml.
in-scope = ["**/*.md"]
exclude = []
# The six finding kinds of `[[rr:AD-3]]`, all reported by default. A project
# may disable one during adoption; an empty list disables the gate.
rules = [
  "malformed-marker",
  "dangling-marker",
  "ambiguous-marker",
  "path-only-marker",
  "path-line",
  "stale-mention",
]

# ---------------------------------------------------------------------------
# The default profile's anchor kinds (`[[rr:AD-1]]`). Each declares a host
# matcher and, where the kind needs one, its identity rule. Span rules are
# fixed per kind family by `[[rr:AD-1]]`.
# ---------------------------------------------------------------------------

[anchor.record]
# A titled region whose title opens with an ID immediately followed by the
# title's first colon; the ID is the identity. A project narrows the pattern,
# e.g. pattern = "AD-[0-9]+".
pattern = "[A-Z][A-Z0-9]*-[0-9]+"
defined-by = "heading"
files = ["**/*.md"]

[anchor.heading]
# Any other titled region; the identity is the full title text, compared
# byte-for-byte after NFC (`[[rr:AD-1]]`): no slugs, no case folding.
files = ["**/*.md"]

[anchor.scenario]
# A gherkin titled region; the identity is the title text.
files = ["**/*.feature"]

[anchor.symbol]
# Code definitions from language extractors. Built-in grammars (Rust,
# Markdown) are on by default; third-party grammars load from WebAssembly.
languages = "built-in"

[anchor.key]
# A manifest entry; the identity is the entry's name as the format writes
# it, for TOML `[table] key`.
files = ["**/*.toml"]

[anchor.operation]
# An API operation; for OpenAPI, the operationId value.
defined-by = "yaml-key"
key = "operationId"
files = ["**/*.{yaml,yml,json}"]

# ---------------------------------------------------------------------------
# Scan regions: which byte ranges are read for markers and path mentions
# (`[[rr:AD-2]]`, `[[rr:AD-5]]`). Conservative: only contexts rr understands
# structurally, so code and string literals are never mis-read as prose.
# Unknown file types are not scanned until a rule declares their regions.
# ---------------------------------------------------------------------------

[scan.markdown]
eligible = ["prose"]               # prose and inline code spans; fenced blocks are invisible

[scan.text]
eligible = ["all"]                 # .txt / .rst and other plain prose, per raw line

# Code languages: add a [scan.<lang>] (built-in or via plugin) to scan their
# comments, e.g. [scan.rust] with eligible = ["comments"].
