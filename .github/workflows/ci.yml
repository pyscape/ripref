name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # rustfmt + clippy + tests, on every first-class platform.
  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format (cargo fmt-check)
        run: cargo fmt-check
      - name: Lint (cargo lint)
        run: cargo lint
      - name: Test (cargo test --all)
        run: cargo test --all

  # Coverage gate: fail if line coverage regresses below the threshold.
  coverage:
    name: coverage (cargo cov-gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage gate
        run: cargo cov-gate

  # Markdown: lint + format check, both via rumdl (Rust-native, no Node).
  docs:
    name: docs (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rumdl
        run: cargo install rumdl --locked --version 0.2.20
      - name: Lint Markdown
        run: rumdl check .
      - name: Check Markdown formatting
        run: rumdl fmt --check .
      - name: Check Markdown is ASCII-only
        # ripgrep is preinstalled on ubuntu-latest runners. It finds any
        # non-ASCII byte in tracked Markdown (em dashes, curly quotes, etc.);
        # test fixtures under tests/data are exempt. rg exits 0 when it matches,
        # so a match trips the gate.
        run: |
          if rg -n --column -g '*.md' -g '!tests/data/**' '[^\x00-\x7F]' .; then
            echo 'error: non-ASCII characters found in Markdown (replace em dashes, curly quotes, etc. with ASCII)'
            exit 1
          fi
