# Repeatable quality entry points (see doc/TESTING.md).
#
# Linting & formatting (built-in: rustfmt + clippy components):
#   cargo fmt-check — verify formatting without rewriting (CI gate)
#   cargo lint      — clippy across all targets, warnings as errors (CI gate)
#
# Coverage (require: cargo-llvm-cov + llvm-tools-preview):
#   cargo cov       — print the per-file coverage table
#   cargo cov-gate  — same, but fail if line coverage drops below 85%
#   cargo cov-html  — write an HTML report under target/llvm-cov/html/
[alias]
fmt-check = "fmt --check"
lint = "clippy --all-targets --all-features -- -D warnings"
cov = "llvm-cov --all-targets --summary-only"
cov-gate = "llvm-cov --all-targets --fail-under-lines 85"
cov-html = "llvm-cov --all-targets --html"
